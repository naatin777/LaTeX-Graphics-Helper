name: Playwright (macOS)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: playwright-macos-${{ github.ref }}
    cancel-in-progress: true

jobs:
    playwright:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v7

            - run: corepack enable
              shell: bash

            - run: corepack prepare pnpm@11.8.0 --activate
              shell: bash

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: pnpm exec playwright install
              shell: bash

            - run: pnpm run test:playwright
              shell: bash

            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report-macos
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore
