name: Release VSCode Extension

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Package Extension
        run: npx vsce package

      - name: GitHub Release (VSIX + Full Changelog compare link)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          tag="${{ github.ref_name }}"
          prev=$(gh api "repos/$repo/releases/latest" --jq .tag_name 2>/dev/null || true)
          if [[ -n "$prev" ]]; then
            notes="**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
          else
            notes="**Full Changelog**: https://github.com/$repo/commits/$tag"
          fi
          gh release create "$tag" *.vsix --notes "$notes"

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish --pat ${{ secrets.OVSX_PAT }}
