name: Release VSCode Extension

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    package:
        name: Package and test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                      test_command: xvfb-run pnpm run test:playwright
                      artifact_suffix: linux
                    - os: macos-latest
                      label: macOS
                      test_command: pnpm run test:playwright
                      artifact_suffix: macos
                    - os: windows-latest
                      label: Windows
                      test_command: pnpm run test:playwright
                      artifact_suffix: windows
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - name: Build extension and Webview
              run: pnpm run build
              shell: bash

            - name: Package current runner VSIX
              run: pnpm run package:vsix -- --out "latex-graphics-helper-${{ matrix.label }}.vsix"
              shell: bash

            - name: Install VSIX and run Electron Playwright
              run: ${{ matrix.test_command }}
              shell: bash
              env:
                  LGH_VSIX_PATH: ${{ github.workspace }}/latex-graphics-helper-${{ matrix.label }}.vsix

            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: packaged-electron-playwright-${{ matrix.artifact_suffix }}
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore

            - if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: vsix-${{ matrix.artifact_suffix }}
                  path: latex-graphics-helper-${{ matrix.label }}.vsix
                  if-no-files-found: error

    publish:
        name: Publish VSIX packages
        needs: package
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - uses: actions/download-artifact@v4
              with:
                  pattern: vsix-*
                  merge-multiple: true
                  path: .

            - name: GitHub Release (VSIX + Full Changelog compare link)
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  repo="${{ github.repository }}"
                  tag="${{ github.ref_name }}"
                  prev=$(gh api "repos/$repo/releases/latest" --jq .tag_name 2>/dev/null || true)
                  if [[ -n "$prev" ]]; then
                    notes="**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
                  else
                    notes="**Full Changelog**: https://github.com/$repo/commits/$tag"
                  fi
                  if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
                    gh release upload "$tag" ./*.vsix --repo "$repo" --clobber
                  else
                    gh release create "$tag" ./*.vsix --repo "$repo" --notes "$notes"
                  fi

            - name: Publish to Visual Studio Marketplace
              shell: bash
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: |
                  for vsix in ./*.vsix; do
                    pnpm exec vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
                  done

            - name: Publish to Open VSX
              shell: bash
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
              run: |
                  for vsix in ./*.vsix; do
                    pnpm exec ovsx publish "$vsix" --pat "$OVSX_PAT"
                  done
