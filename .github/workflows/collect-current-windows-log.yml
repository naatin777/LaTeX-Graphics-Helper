name: Collect Apply EPS Fix Log

on:
    pull_request:

permissions:
    actions: read

jobs:
    collect:
        runs-on: ubuntu-latest
        steps:
            - name: Download apply job log
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh api repos/${{ github.repository }}/actions/jobs/88690872207/logs > apply-eps-fix.log
              shell: bash

            - uses: actions/upload-artifact@v7
              with:
                  name: apply-eps-fix-log
                  path: apply-eps-fix.log
                  retention-days: 1
