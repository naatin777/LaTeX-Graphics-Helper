name: Collect Check Log

on:
    pull_request:

permissions:
    actions: read

jobs:
    collect:
        runs-on: ubuntu-latest
        steps:
            - name: Download check job log
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh api repos/${{ github.repository }}/actions/jobs/88704005126/logs > check.log
              shell: bash

            - uses: actions/upload-artifact@v7
              with:
                  name: check-log
                  path: check.log
                  retention-days: 1
