name: Test (Windows)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-windows-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.detect.outputs.docs_only }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - id: detect
              run: bash .github/scripts/detect-docs-only.sh
              shell: bash
              env:
                  EVENT_BEFORE: ${{ github.event.before }}

    vscode-test:
        needs: changes
        if: needs.changes.outputs.docs_only != 'true'
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - shell: pwsh
              run: .github/scripts/install-image-tools-windows.ps1

            - shell: pwsh
              run: .github/scripts/verify-image-tools-windows.ps1

            - run: pnpm run test
              shell: bash
