name: Test (Windows)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-windows-${{ github.ref }}
    cancel-in-progress: true

jobs:
    vscode-test:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - shell: pwsh
              run: .github/scripts/install-image-tools-windows.ps1

            - run: |
                  set -o pipefail
                  pnpm run test 2>&1 | tee vscode-test.log
              shell: bash

            - name: Annotate VS Code test failure
              if: failure()
              run: |
                  if [ -f vscode-test.log ]; then
                    {
                      echo "### Windows VS Code test log tail"
                      echo '```text'
                      tail -n 120 vscode-test.log
                      echo '```'
                    } >> "$GITHUB_STEP_SUMMARY"

                    awk '/[0-9]+ failing/{flag=1} flag{print}' vscode-test.log > vscode-test-failure-summary.log
                    if [ ! -s vscode-test-failure-summary.log ]; then
                      tail -n 80 vscode-test.log > vscode-test-failure-summary.log
                    fi

                    message="$(cat vscode-test-failure-summary.log | perl -0777 -pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
                    echo "::error title=Windows VS Code test failed::$message"
                  fi
              shell: bash

            - uses: actions/upload-artifact@v6
              if: failure()
              with:
                  name: vscode-test-windows-log
                  path: vscode-test.log
