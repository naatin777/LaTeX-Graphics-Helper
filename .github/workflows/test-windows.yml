name: Test (Windows)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-windows-${{ github.ref }}
    cancel-in-progress: true

jobs:
    vscode-test:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v7

            - run: corepack enable
              shell: bash

            - run: corepack prepare pnpm@11.8.0 --activate
              shell: bash

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - shell: pwsh
              run: .github/scripts/install-image-tools-windows.ps1

            - shell: pwsh
              run: .github/scripts/verify-image-tools-windows.ps1

            - run: pnpm run test
              shell: bash
