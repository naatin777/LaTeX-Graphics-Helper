name: Test (Windows)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-windows-${{ github.ref }}
    cancel-in-progress: true

jobs:
    vscode-test:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - shell: pwsh
              run: .github/scripts/install-image-tools-windows.ps1

            - run: |
                  set -o pipefail
                  pnpm run test 2>&1 | tee vscode-test.log
              shell: bash

            - uses: actions/upload-artifact@v6
              if: failure()
              with:
                  name: vscode-test-windows-log
                  path: vscode-test.log
