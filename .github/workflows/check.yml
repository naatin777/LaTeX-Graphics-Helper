name: Check

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: check-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - run: corepack enable
              shell: bash

            - run: corepack prepare pnpm@11.8.0 --activate
              shell: bash

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: pnpm run rulesync:check
              shell: bash

            - run: pnpm run check
              shell: bash
