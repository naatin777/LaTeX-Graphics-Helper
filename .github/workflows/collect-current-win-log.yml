name: Collect Current Windows Log

on:
    pull_request:

permissions:
    actions: read

jobs:
    collect:
        runs-on: ubuntu-latest
        steps:
            - name: Download Windows job log
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh api repos/${{ github.repository }}/actions/jobs/88693943873/logs > windows-test.log
              shell: bash

            - uses: actions/upload-artifact@v7
              with:
                  name: current-windows-test-log
                  path: windows-test.log
                  retention-days: 1
