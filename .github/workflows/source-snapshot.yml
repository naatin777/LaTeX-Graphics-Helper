name: Apply Manifest Fix

on:
    pull_request:

permissions:
    contents: write

jobs:
    patch:
        if: github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.head_ref }}

            - name: Align image combine menu inputs
              run: |
                  python - <<'PY'
                  import json
                  from pathlib import Path

                  package_path = Path('package.json')
                  package = json.loads(package_path.read_text())
                  command = 'latex-graphics-helper.convertImagesToSinglePdf'

                  for item in package['contributes']['menus']['explorer/context']:
                      if item.get('command') == command:
                          item['when'] = "resourceExtname =~ /^\\.(png|jpg|jpeg|webp|avif|gif|tif|tiff|svg|eps)$/i && config.latex-graphics-helper.contextMenu.enabled"

                  command_palette = package['contributes']['menus']['commandPalette']
                  if not any(item.get('command') == command for item in command_palette):
                      command_palette.append({'command': command, 'when': 'false'})

                  package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')
                  PY

                  git rm .github/workflows/source-snapshot.yml
                  git diff --check
                  git config user.name github-actions[bot]
                  git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                  git add package.json
                  git commit -m "fix: align image combine menu inputs"
                  git push origin HEAD:${{ github.head_ref }}
              shell: bash
