name: Playwright

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: playwright-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci_scope:
        name: ci-scope
        runs-on: ubuntu-latest
        outputs:
            reason: ${{ steps.detect.outputs.reason }}
            run_browser_playwright: ${{ steps.detect.outputs.run_browser_playwright }}
            scope: ${{ steps.detect.outputs.scope }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - id: detect
              run: node .github/scripts/detect-ci-scope.mjs
              shell: bash
              env:
                  EVENT_BEFORE: ${{ github.event.before }}

    playwright:
        name: playwright (${{ matrix.label }})
        needs: ci_scope
        if: needs.ci_scope.outputs.run_browser_playwright == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                      test_command: xvfb-run pnpm run test:playwright
                      artifact_suffix: linux
                    - os: macos-latest
                      label: macOS
                      test_command: pnpm run test:playwright
                      artifact_suffix: macos
                    - os: windows-latest
                      label: Windows
                      test_command: pnpm run test:playwright
                      artifact_suffix: windows
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: pnpm exec playwright install
              shell: bash

            - run: ${{ matrix.test_command }}
              shell: bash

            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report-${{ matrix.artifact_suffix }}
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore

    playwright_gate:
        name: playwright-gate
        needs:
            - ci_scope
            - playwright
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Summarize Playwright scope
              shell: bash
              env:
                  CLASSIFIER_RESULT: ${{ needs.ci_scope.result }}
                  PLAYWRIGHT_RESULT: ${{ needs.playwright.result }}
                  REASON: ${{ needs.ci_scope.outputs.reason }}
                  RUN_BROWSER_PLAYWRIGHT: ${{ needs.ci_scope.outputs.run_browser_playwright }}
                  SCOPE: ${{ needs.ci_scope.outputs.scope }}
              run: |
                  {
                    echo '### Playwright CI scope'
                    echo "- Scope: \`${SCOPE:-unavailable}\`"
                    echo "- Reason: \`${REASON:-unavailable}\`"
                    echo "- Browser Playwright required: \`${RUN_BROWSER_PLAYWRIGHT:-unavailable}\`"
                    echo "- Classifier result: \`${CLASSIFIER_RESULT}\`"
                    echo "- Playwright result: \`${PLAYWRIGHT_RESULT}\`"
                  } >> "${GITHUB_STEP_SUMMARY}"

            - name: Verify Playwright result
              shell: bash
              env:
                  CLASSIFIER_RESULT: ${{ needs.ci_scope.result }}
                  PLAYWRIGHT_RESULT: ${{ needs.playwright.result }}
                  RUN_BROWSER_PLAYWRIGHT: ${{ needs.ci_scope.outputs.run_browser_playwright }}
              run: |
                  if [[ "${CLASSIFIER_RESULT}" != 'success' ]]; then
                    echo 'CI scope classifier did not succeed.' >&2
                    exit 1
                  fi

                  case "${RUN_BROWSER_PLAYWRIGHT}" in
                    true) expected_result='success' ;;
                    false) expected_result='skipped' ;;
                    *)
                      echo 'CI scope classifier returned an invalid Playwright flag.' >&2
                      exit 1
                      ;;
                  esac

                  if [[ "${PLAYWRIGHT_RESULT}" != "${expected_result}" ]]; then
                    echo "Expected Playwright result ${expected_result}, got ${PLAYWRIGHT_RESULT}." >&2
                    exit 1
                  fi
