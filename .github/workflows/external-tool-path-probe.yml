name: External Tool Path Probe

on:
  pull_request:
    paths:
      - ".github/workflows/external-tool-path-probe.yml"
      - ".github/scripts/install-drawio-path-probe-*"
      - ".github/scripts/probe-external-tool-paths.mjs"
      - ".github/scripts/run-external-tool-path-probe-*"
      - "test/fixtures/path-compatibility/**"
  workflow_dispatch:

jobs:
  probe:
    name: probe (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - if: matrix.os == 'ubuntu-latest'
        run: bash .github/scripts/install-test-tools-linux.sh
        shell: bash

      - if: matrix.os == 'macos-latest'
        run: bash .github/scripts/install-image-tools-macos.sh
        shell: bash

      - if: matrix.os == 'windows-latest'
        run: .github/scripts/install-image-tools-windows.ps1
        shell: pwsh

      - if: matrix.os != 'windows-latest'
        run: bash .github/scripts/install-drawio-path-probe-unix.sh
        shell: bash

      - if: matrix.os == 'windows-latest'
        run: .github/scripts/install-drawio-path-probe-windows.ps1
        shell: pwsh

      - if: matrix.os != 'windows-latest'
        run: bash .github/scripts/run-external-tool-path-probe-unix.sh
        shell: bash

      - if: matrix.os == 'windows-latest'
        run: .github/scripts/run-external-tool-path-probe-windows.ps1
        shell: pwsh

      - uses: actions/upload-artifact@v7
        with:
          name: external-tool-path-probe-${{ matrix.label }}
          path: ${{ runner.temp }}/lgh-external-tool-path-probe/result
          if-no-files-found: error
