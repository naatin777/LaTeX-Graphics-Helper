name: Test (Linux)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-linux-${{ github.ref }}
    cancel-in-progress: true

jobs:
    vscode-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - run: corepack enable
              shell: bash

            - run: corepack prepare pnpm@11.8.0 --activate
              shell: bash

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: bash .github/scripts/install-test-tools-linux.sh
              shell: bash

            - run: bash .github/scripts/verify-image-tools-unix.sh
              shell: bash

            - run: xvfb-run pnpm run test
              shell: bash
