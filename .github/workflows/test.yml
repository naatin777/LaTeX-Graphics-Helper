name: Test VSCode Extension

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.28.2

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check
              run: pnpm run check

    vscode-test:
        name: vscode-test (${{ matrix.label }})
        needs: check
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: linux
                      run-prefix: xvfb-run
                    - os: macos-latest
                      label: macos
                      run-prefix: ''
                    - os: windows-latest
                      label: windows
                      run-prefix: ''

        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.28.2

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - name: Install test tools
              uses: ./.github/actions/setup-test-tools

            - name: Export tool paths for tests
              shell: bash
              run: bash .github/scripts/export-tool-paths.sh

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run vscode-test
              shell: bash
              run: |
                  if [ -n "${{ matrix.run-prefix }}" ]; then
                    ${{ matrix.run-prefix }} pnpm run test
                  else
                    pnpm run test
                  fi

    vscode-test-wsl:
        name: vscode-test (wsl)
        needs: check
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Run vscode-test in WSL
              shell: pwsh
              run: |
                  $repo = (wsl wslpath -a $env:GITHUB_WORKSPACE).Trim()
                  wsl bash -lc "cd '$repo' && bash .github/scripts/run-vscode-test-wsl.sh"

    playwright:
        name: playwright (${{ matrix.label }})
        needs: check
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: linux
                      run-prefix: xvfb-run
                    - os: macos-latest
                      label: macos
                      run-prefix: ''
                    - os: windows-latest
                      label: windows
                      run-prefix: ''

        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.28.2

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright CLI
              run: pnpm exec playwright install

            - name: Run Playwright smoke tests
              shell: bash
              run: |
                  if [ -n "${{ matrix.run-prefix }}" ]; then
                    ${{ matrix.run-prefix }} pnpm run test:playwright
                  else
                    pnpm run test:playwright
                  fi

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ matrix.label }}
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore
