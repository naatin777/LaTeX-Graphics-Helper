name: Test

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.detect.outputs.docs_only }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - id: detect
              run: bash .github/scripts/detect-docs-only.sh
              shell: bash
              env:
                  EVENT_BEFORE: ${{ github.event.before }}

    node-test:
        name: node-test (${{ matrix.label }})
        needs: changes
        if: needs.changes.outputs.docs_only != 'true'
        runs-on: ${{ matrix.os }}
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                    - os: macos-latest
                      label: macOS
                    - os: windows-latest
                      label: Windows
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: pnpm run test:node
              shell: bash

    vscode-test:
        name: vscode-test (${{ matrix.label }})
        needs: changes
        if: needs.changes.outputs.docs_only != 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                      test_command: xvfb-run pnpm run test:vscode
                    - os: macos-latest
                      label: macOS
                      test_command: pnpm run test:vscode
                    - os: windows-latest
                      label: Windows
                      test_command: pnpm run test:vscode
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - if: matrix.os == 'ubuntu-latest'
              run: bash .github/scripts/install-test-tools-linux.sh
              shell: bash

            - if: matrix.os == 'macos-latest'
              run: bash .github/scripts/install-image-tools-macos.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/install-image-tools-windows.ps1
              shell: pwsh

            - if: matrix.os != 'windows-latest'
              run: bash .github/scripts/verify-image-tools-unix.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/verify-image-tools-windows.ps1
              shell: pwsh

            - run: ${{ matrix.test_command }}
              shell: bash

            - if: matrix.os == 'ubuntu-latest'
              run: xvfb-run pnpm run test:playwright:electron
              shell: bash

            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: vscode-test-results-${{ matrix.label }}
                  path: test-results/
                  if-no-files-found: ignore
