name: Test

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                      test_command: xvfb-run pnpm run test
                    - os: macos-latest
                      label: macOS
                      test_command: pnpm run test
                    - os: windows-latest
                      label: Windows
                      test_command: pnpm run test
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.13.1

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - id: build
              name: Build extension and Webview
              run: pnpm run build
              shell: bash

            - if: matrix.os == 'ubuntu-latest'
              run: bash .github/scripts/install-test-tools-linux.sh
              shell: bash

            - if: matrix.os == 'macos-latest'
              run: bash .github/scripts/install-image-tools-macos.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/install-image-tools-windows.ps1
              shell: pwsh

            - if: matrix.os != 'windows-latest'
              run: bash .github/scripts/verify-image-tools-unix.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/verify-image-tools-windows.ps1
              shell: pwsh

            - name: Run Node and VS Code Extension Host tests
              run: ${{ matrix.test_command }}
              shell: bash
              env:
                  LGH_VSCODE_TEST_USER_DATA_DIR: .vscode-test-ci-data

            - if: always() && steps.build.outcome == 'success'
              name: Run Webview component tests
              run: pnpm run test:webview
              shell: bash

            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: extension-host-test-${{ matrix.label }}
                  path: .vscode-test-ci-data/
                  if-no-files-found: ignore

            - if: always()
              name: Cleanup VS Code test data
              run: |
                  node --input-type=module -e "import { rm } from 'node:fs/promises'; await rm('.vscode-test-ci-data', { recursive: true, force: true, maxRetries: 20, retryDelay: 200 });"
              shell: bash
