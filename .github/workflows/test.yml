name: Test

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.detect.outputs.docs_only }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - id: detect
              run: bash .github/scripts/detect-docs-only.sh
              shell: bash
              env:
                  EVENT_BEFORE: ${{ github.event.before }}

    vscode-test:
        name: vscode-test (${{ matrix.label }})
        needs: changes
        if: needs.changes.outputs.docs_only != 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux
                      test_command: xvfb-run pnpm run test
                      packaged_test_command: xvfb-run pnpm exec playwright test --project=vscode-electron test/playwright/electron/crop_pdf_configure.spec.ts
                    - os: macos-latest
                      label: macOS
                      test_command: pnpm run test
                      packaged_test_command: pnpm exec playwright test --project=vscode-electron test/playwright/electron/crop_pdf_configure.spec.ts
                    - os: windows-latest
                      label: Windows
                      test_command: pnpm run test
                      packaged_test_command: pnpm exec playwright test --project=vscode-electron test/playwright/electron/crop_pdf_configure.spec.ts
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - if: matrix.os == 'ubuntu-latest'
              run: bash .github/scripts/install-test-tools-linux.sh
              shell: bash

            - if: matrix.os == 'macos-latest'
              run: bash .github/scripts/install-image-tools-macos.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/install-image-tools-windows.ps1
              shell: pwsh

            - if: matrix.os != 'windows-latest'
              run: bash .github/scripts/verify-image-tools-unix.sh
              shell: bash

            - if: matrix.os == 'windows-latest'
              run: .github/scripts/verify-image-tools-windows.ps1
              shell: pwsh

            - run: ${{ matrix.test_command }}
              shell: bash

            - name: Resolve VSIX target
              id: target
              shell: bash
              run: |
                  case "${RUNNER_OS}:${RUNNER_ARCH}" in
                    Linux:X64) echo "value=linux-x64" >> "$GITHUB_OUTPUT" ;;
                    Linux:ARM64) echo "value=linux-arm64" >> "$GITHUB_OUTPUT" ;;
                    macOS:X64) echo "value=darwin-x64" >> "$GITHUB_OUTPUT" ;;
                    macOS:ARM64) echo "value=darwin-arm64" >> "$GITHUB_OUTPUT" ;;
                    Windows:X64) echo "value=win32-x64" >> "$GITHUB_OUTPUT" ;;
                    Windows:ARM64) echo "value=win32-arm64" >> "$GITHUB_OUTPUT" ;;
                    *) echo "Unsupported runner: ${RUNNER_OS}:${RUNNER_ARCH}" >&2; exit 1 ;;
                  esac

            - run: pnpm run build
              shell: bash

            - run: pnpm run package:vsix -- --target "${{ steps.target.outputs.value }}" --out "latex-graphics-helper-${{ steps.target.outputs.value }}.vsix"
              shell: bash

            - name: Run packaged VSIX offline smoke test
              run: ${{ matrix.packaged_test_command }}
              shell: bash
              env:
                  LGH_VSIX_PATH: ${{ github.workspace }}/latex-graphics-helper-${{ steps.target.outputs.value }}.vsix

            - if: matrix.os == 'ubuntu-latest'
              run: xvfb-run pnpm run test:playwright:electron
              shell: bash

            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: vscode-test-results-${{ matrix.label }}
                  path: test-results/
                  if-no-files-found: ignore
