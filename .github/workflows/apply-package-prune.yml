name: Apply Package Prune

on:
    pull_request:

permissions:
    contents: write

jobs:
    prune:
        if: github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.head_ref }}

            - uses: actions/setup-node@v6
              with:
                  node-version: '22.23.1'
                  package-manager-cache: false

            - run: npm install -g npm@12.0.1
              shell: bash

            - run: npm ci
              shell: bash

            - name: Move bundled-only dependencies out of runtime package
              run: |
                  npm uninstall proxy-agent
                  npm install --save-dev pdfjs-dist@^6.1.200 solid-js@^1.9.14
                  npm run build
                  npm run package:vsix -- --out /tmp/latex-graphics-helper-linux.vsix
                  ls -lh /tmp/latex-graphics-helper-linux.vsix

                  git rm .github/workflows/apply-package-prune.yml
                  git diff --check
                  git config user.name github-actions[bot]
                  git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                  git add package.json package-lock.json
                  git commit -m "build: exclude bundled webview dependencies from VSIX"
                  git push origin HEAD:${{ github.head_ref }}
              shell: bash
