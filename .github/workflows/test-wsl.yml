name: Test (WSL / Remote-WSL)

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: test-wsl-${{ github.ref }}
    cancel-in-progress: true

jobs:
    vscode-test:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.28.2

            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
              shell: bash

            - run: sed -i 's/\r$//' .github/scripts/*.sh
              shell: bash

            - id: wsl
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  $distro = 'Ubuntu'
                  wsl --install $distro --no-launch
                  wsl --update
                  wsl --set-default-version 2

                  $ready = $false
                  for ($i = 0; $i -lt 36; $i++) {
                    try {
                      wsl -d $distro -- bash -lc 'echo wsl-ready' | Out-Null
                      $ready = $true
                      break
                    } catch {
                      Start-Sleep -Seconds 10
                    }
                  }

                  if (-not $ready) {
                    throw "WSL distro '$distro' did not become ready in time"
                  }

                  "distro=$distro" >> $env:GITHUB_OUTPUT

            - id: prepare
              name: Prepare WSL workspace and tools
              shell: bash
              run: |
                  repo=$(bash .github/scripts/wsl-repo-path.sh)
                  workspace=$(wsl -d "${{ steps.wsl.outputs.distro }}" -- bash -lc "bash '$repo/.github/scripts/wsl-prepare.sh' vscode-test")
                  echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
                  echo "extensionPath=$repo" >> "$GITHUB_OUTPUT"

            - name: Run vscode-test via Remote-WSL
              shell: pwsh
              env:
                  LGH_WSL_DISTRO: ${{ steps.wsl.outputs.distro }}
                  LGH_WSL_WORKSPACE: ${{ steps.prepare.outputs.workspace }}
                  LGH_WSL_EXTENSION_PATH: ${{ steps.prepare.outputs.extensionPath }}
              run: pnpm run test:wsl
